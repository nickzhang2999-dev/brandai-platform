version: 2
# 分组策略：每个生态把「版本更新」与「安全更新」各合并为单个分组 PR
# （patterns: ["*"]），并把 open-pull-requests-limit 收紧到 3 作为安全上限。
# 背景：旧配置只给 dev-deps 分组，其余每个生产依赖各开一个 PR，首次运行就开到
# npm10 + pip5 + actions5 ≈ 20 个，造成 PR 列表泛滥。
# 注意：Dependabot `groups.applies-to` 默认只作用于 version-updates，安全更新需单列
# 一个 applies-to: security-updates 的分组，否则漏洞依赖仍会各开独立 PR。
updates:
  # GitHub Actions 版本更新（安全 + 兼容）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]

  # JS/TS 依赖（pnpm workspace 根）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns: ["*"]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]

  # apps/ai Python 依赖
  - package-ecosystem: "pip"
    directory: "/apps/ai"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      pip-dependencies:
        applies-to: version-updates
        patterns: ["*"]
      pip-security:
        applies-to: security-updates
        patterns: ["*"]
