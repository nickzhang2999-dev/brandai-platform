name: Release

# 打 v* 标签即发布：自动生成 release notes 的 GitHub Release。
# 例：git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的标签 (如 v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # 手动触发时检出输入标签所指的提交，避免 release 打在分支 HEAD 上而非
          # 标签实际指向的提交;tag push 触发时 ref 为空,默认检出该标签。
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
